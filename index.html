<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EREF Iva Ferreira - Gestão Pedagógica</title>
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, onSnapshot, getDocs, limit, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "gen-lang-client-0113178044",
            appId: "1:360412491290:web:f8ed86bc3e74be7f092ba3",
            apiKey: "AIzaSyAurwNOe20E-ky9ThRMy3lGspdlJdH3XfY",
            authDomain: "gen-lang-client-0113178044.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-c78956be-56e7-4b63-a053-09dc58b9de00",
            storageBucket: "gen-lang-client-0113178044.firebasestorage.app",
            messagingSenderId: "360412491290"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const googleProvider = new GoogleAuthProvider();

        // --- State Management ---
        let currentView = 'dashboard';
        let currentUser = { 
            uid: 'public-user',
            displayName: 'Visitante', 
            photoURL: 'https://ui-avatars.com/api/?name=Visitante&background=0D8ABC&color=fff' 
        };

        // --- UI Elements ---
        const mainApp = document.getElementById('main-app');
        const appLoading = document.getElementById('app-loading');
        const viewContent = document.getElementById('view-content');

        // --- Auth Bypass Logic ---
        function initApp() {
            appLoading.classList.add('hidden');
            mainApp.classList.remove('hidden');
            document.getElementById('user-name').textContent = currentUser.displayName;
            document.getElementById('user-photo').src = currentUser.photoURL;
            navigateTo('dashboard');
            
            // Testing connection
            console.log("Sistema iniciado em modo de acesso livre.");
        }

        // Initialize immediately
        document.addEventListener('DOMContentLoaded', initApp);

        window.logout = () => {
            alert("Acesso livre ativado. Não é necessário sair.");
        };

        // --- Navigation ---
        window.navigateTo = (view) => {
            currentView = view;
            
            // Update Sidebar Highlight
            document.querySelectorAll('.nav-item').forEach(item => {
                const itemPath = item.getAttribute('data-path');
                if (itemPath === view) {
                    item.classList.add('bg-blue-50', 'text-blue-700', 'border-r-4', 'border-blue-700');
                    item.classList.remove('text-gray-600', 'hover:bg-gray-50');
                } else {
                    item.classList.remove('bg-blue-50', 'text-blue-700', 'border-r-4', 'border-blue-700');
                    item.classList.add('text-gray-600', 'hover:bg-gray-50');
                }
            });

            renderView();
        };

        async function renderView() {
            viewContent.innerHTML = '<div class="flex justify-center py-12"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div></div>';
            
            try {
                switch(currentView) {
                    case 'dashboard':
                        await renderDashboard();
                        break;
                    case 'alunos':
                        await renderAlunos();
                        break;
                    case 'ocorrencias':
                        await renderOcorrencias();
                        break;
                    case 'diario':
                        await renderDiario();
                        break;
                    case 'relatorios':
                        renderRelatorios();
                        break;
                }
                lucide.createIcons();
            } catch (err) {
                console.error("View render error:", err);
                viewContent.innerHTML = '<div class="p-8 text-red-500 font-bold">Erro ao carregar os dados. Verifique o console.</div>';
            }
        }

        // --- Views ---

        async function renderDashboard() {
            // Fetch stats for dashboard
            const qAlunos = query(collection(db, "students"));
            const qOcorr = query(collection(db, "occurrences"));
            const snapAlunos = await getDocs(qAlunos);
            const snapOcorr = await getDocs(qOcorr);

            viewContent.innerHTML = `
                <div class="px-8 pt-8">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Painel de Controle</h1>
                    <p class="text-gray-500 mb-8">Bem-vindo(a), acompanhe o resumo do dia.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="flex items-center justify-between mb-4">
                                <div class="bg-blue-50 p-2 rounded-lg"><i data-lucide="users" class="text-blue-600 w-6 h-6"></i></div>
                                <span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full font-medium">Ativos</span>
                            </div>
                            <h3 class="text-gray-500 text-sm font-medium">Total de Alunos</h3>
                            <p class="text-3xl font-bold text-gray-900">${snapAlunos.size}</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="flex items-center justify-between mb-4">
                                <div class="bg-red-50 p-2 rounded-lg"><i data-lucide="alert-circle" class="text-red-600 w-6 h-6"></i></div>
                                <span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full font-medium">Controle</span>
                            </div>
                            <h3 class="text-gray-500 text-sm font-medium">Ocorrências Totais</h3>
                            <p class="text-3xl font-bold text-gray-900">${snapOcorr.size}</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="flex items-center justify-between mb-4">
                                <div class="bg-green-50 p-2 rounded-lg"><i data-lucide="check-circle" class="text-green-600 w-6 h-6"></i></div>
                                <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-medium">Diário</span>
                            </div>
                            <h3 class="text-gray-500 text-sm font-medium">Ações Realizadas</h3>
                            <p class="text-3xl font-bold text-gray-900">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="flex items-center justify-between mb-4">
                                <div class="bg-amber-50 p-2 rounded-lg"><i data-lucide="clock" class="text-amber-600 w-6 h-6"></i></div>
                                <span class="bg-amber-100 text-amber-700 text-xs px-2 py-1 rounded-full font-medium">Pendente</span>
                            </div>
                            <h3 class="text-gray-500 text-sm font-medium">Tarefas Ativas</h3>
                            <p class="text-3xl font-bold text-gray-900">12</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                            <h3 class="text-lg font-bold text-gray-900 mb-4">Atividade Recente</h3>
                            <div class="space-y-4">
                                <p class="text-gray-500 italic text-center py-8">Nenhuma atividade recente registrada.</p>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                             <div class="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="award" class="text-blue-600 w-10 h-10"></i>
                            </div>
                            <h3 class="text-xl font-bold text-gray-900 mb-2">Resumo da Unidade</h3>
                            <p class="text-gray-500 mb-6">Acompanhe as metas e objetivos pedagógicos da unidade escolar atual.</p>
                            <button class="w-full bg-blue-700 text-white font-semibold py-3 rounded-xl hover:bg-blue-800 transition shadow-lg shadow-blue-200">Ver Planejamento</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function renderAlunos() {
            const q = query(collection(db, "students"), orderBy("name"));
            const snap = await getDocs(q);
            const students = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));

            viewContent.innerHTML = `
                <div class="px-8 pt-8">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">Alunos</h1>
                            <p class="text-gray-500">Gestão de estudantes da unidade.</p>
                        </div>
                        <button onclick="openModal('modal-add-student')" class="bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-800 transition">
                            <i data-lucide="plus" class="w-5 h-5"></i> Novo Aluno
                        </button>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50 text-left border-b border-gray-100">
                                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Nome</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Turma</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Responsável</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider"></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${students.length === 0 ? '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Nenhum aluno cadastrado.</td></tr>' : 
                                    students.map(s => `
                                        <tr class="hover:bg-gray-50 transition">
                                            <td class="px-6 py-4">
                                                <div class="flex items-center gap-3">
                                                    <div class="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">
                                                        ${s.name.charAt(0)}
                                                    </div>
                                                    <span class="font-medium text-gray-900">${s.name}</span>
                                                </div>
                                            </td>
                                            <td class="px-6 py-4 text-gray-600">${s.grade}</td>
                                            <td class="px-6 py-4 text-gray-600">${s.responsible || '-'}</td>
                                            <td class="px-6 py-4">
                                                <span class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">Ativo</span>
                                            </td>
                                            <td class="px-6 py-4 text-right">
                                                <button onclick="deleteStudent('${s.id}')" class="text-red-500 hover:text-red-700"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')
                                }
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Modal Add Student -->
                <div id="modal-add-student" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                    <div class="bg-white rounded-2xl w-full max-w-md p-8">
                        <h3 class="text-xl font-bold mb-6">Cadastrar Novo Aluno</h3>
                        <form onsubmit="saveStudent(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                                <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Turma</label>
                                <input type="text" name="grade" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Responsável</label>
                                <input type="text" name="responsible" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
                                <input type="text" name="phone" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div class="flex gap-4 pt-4">
                                <button type="button" onclick="closeModal('modal-add-student')" class="flex-1 px-4 py-2 bg-gray-100 rounded-lg font-medium">Cancelar</button>
                                <button type="submit" class="flex-1 px-4 py-2 bg-blue-700 text-white rounded-lg font-medium hover:bg-blue-800 transition">Salvar</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.saveStudent = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Salvando...';

            const formData = new FormData(e.target);
            const data = {
                name: formData.get('name'),
                grade: formData.get('grade'),
                responsible: formData.get('responsible') || '',
                phone: formData.get('phone') || '',
                createdAt: serverTimestamp()
            };
            try {
                await addDoc(collection(db, "students"), data);
                closeModal('modal-add-student');
                renderAlunos();
            } catch (err) {
                console.error("Erro ao salvar aluno:", err);
                alert("Erro ao salvar aluno: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar';
            }
        };

        window.deleteStudent = async (id) => {
            if(confirm("Deseja realmente remover este aluno?")) {
                try {
                    await deleteDoc(doc(db, "students", id));
                    renderAlunos();
                } catch (err) {
                    console.error("Erro ao deletar:", err);
                    alert("Erro ao deletar: " + err.message);
                }
            }
        }

        async function renderOcorrencias() {
             const q = query(collection(db, "occurrences"), orderBy("date", "desc"));
             const snap = await getDocs(q);
             const occurrences = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));

             // Need student names for the select
             const qS = query(collection(db, "students"), orderBy("name"));
             const snapS = await getDocs(qS);
             const students = snapS.docs.map(doc => ({id: doc.id, name: doc.data().name}));

            viewContent.innerHTML = `
                <div class="px-8 pt-8">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">Ocorrências</h1>
                            <p class="text-gray-500">Registro de comportamentos e sanções.</p>
                        </div>
                        <button onclick="openModal('modal-add-occurrence')" class="bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-800 transition">
                            <i data-lucide="plus" class="w-5 h-5"></i> Nova Ocorrência
                        </button>
                    </div>

                    <div class="space-y-4">
                        ${occurrences.length === 0 ? '<div class="bg-white p-12 text-center text-gray-500 rounded-2xl border border-gray-100">Nenhuma ocorrência registrada.</div>' : 
                            occurrences.map(o => `
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex gap-6 items-start">
                                    <div class="h-12 w-12 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center shrink-0">
                                        <i data-lucide="alert-triangle"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-start mb-2">
                                            <h3 class="font-bold text-gray-900 text-lg">${o.studentName}</h3>
                                            <span class="text-sm text-gray-400 font-medium">${new Date(o.date).toLocaleDateString()}</span>
                                        </div>
                                        <p class="text-gray-600 mb-4">${o.description}</p>
                                        <div class="flex gap-2">
                                            <span class="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-xs font-semibold">${o.severity}</span>
                                            <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-semibold">${o.actionTaken}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>

                <div id="modal-add-occurrence" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                    <div class="bg-white rounded-2xl w-full max-w-lg p-8">
                        <h3 class="text-xl font-bold mb-6">Nova Ocorrência</h3>
                        <form onsubmit="saveOccurrence(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Aluno</label>
                                <select name="studentId" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option value="">Selecione o aluno</option>
                                    ${students.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Data</label>
                                <input type="date" name="date" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                                <textarea name="description" required rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Gravidade</label>
                                    <select name="severity" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option>Leve</option>
                                        <option>Média</option>
                                        <option>Grave</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Providência</label>
                                    <input type="text" name="actionTaken" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                            </div>
                            <div class="flex gap-4 pt-4">
                                <button type="button" onclick="closeModal('modal-add-occurrence')" class="flex-1 px-4 py-2 bg-gray-100 rounded-lg font-medium">Cancelar</button>
                                <button type="submit" class="flex-1 px-4 py-2 bg-blue-700 text-white rounded-lg font-medium hover:bg-blue-800 transition">Lançar</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.saveOccurrence = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Lançando...';

            const formData = new FormData(e.target);
            const select = e.target.querySelector('select[name="studentId"]');
            const studentId = formData.get('studentId');
            const studentName = select.options[select.selectedIndex].text;

            const data = {
                studentId,
                studentName,
                date: formData.get('date'),
                description: formData.get('description'),
                severity: formData.get('severity') || 'Leve',
                actionTaken: formData.get('actionTaken') || '',
                reportedBy: currentUser.displayName,
                reportedById: currentUser.uid,
                createdAt: serverTimestamp()
            };
            try {
                await addDoc(collection(db, "occurrences"), data);
                closeModal('modal-add-occurrence');
                renderOcorrencias();
            } catch (err) {
                console.error("Erro ao salvar ocorrência:", err);
                alert("Erro ao salvar ocorrência: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Lançar';
            }
        };

        async function renderDiario() {
             const q = query(collection(db, "diary"), orderBy("createdAt", "desc"), limit(50));
             const snap = await getDocs(q);
             const entries = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));

            viewContent.innerHTML = `
                <div class="px-8 pt-8">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">Diário da Coordenação</h1>
                            <p class="text-gray-500">Histórico de ações e atendimentos.</p>
                        </div>
                        <button onclick="openModal('modal-add-diary')" class="bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-800 transition">
                            <i data-lucide="plus" class="w-5 h-5"></i> Nova Entrada
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${entries.length === 0 ? '<div class="col-span-full bg-white p-12 text-center text-gray-500 rounded-2xl border border-gray-100">Nenhum registro no diário.</div>' : 
                            entries.map(e => `
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div class="flex justify-between mb-4">
                                        <span class="bg-blue-100 text-blue-700 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wide">${e.tag || 'Atendimento'}</span>
                                        <span class="text-gray-400 text-xs font-medium">${e.createdAt?.toDate().toLocaleString() || '-'}</span>
                                    </div>
                                    <h3 class="text-lg font-bold text-gray-900 mb-2 truncate">${e.title}</h3>
                                    <p class="text-gray-600 mb-6 text-sm line-clamp-3">${e.content}</p>
                                    <div class="flex items-center gap-2 pt-4 border-t border-gray-50">
                                        <div class="bg-gray-200 w-6 h-6 rounded-full overflow-hidden flex items-center justify-center text-[10px] uppercase font-bold text-gray-500">${e.authorName?.charAt(0) || 'A'}</div>
                                        <span class="text-xs text-gray-500 font-medium">${e.authorName || 'Autor'}</span>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>

                <div id="modal-add-diary" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                    <div class="bg-white rounded-2xl w-full max-w-lg p-8">
                        <h3 class="text-xl font-bold mb-6">Nova Entrada no Diário</h3>
                        <form onsubmit="saveDiary(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Título / Assunto</label>
                                <input type="text" name="title" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                                <select name="tag" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option>Atendimento a Aluno</option>
                                    <option>Reunião com Pais</option>
                                    <option>Pauta Pedagógica</option>
                                    <option>Observação Disciplinar</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Relato Completo</label>
                                <textarea name="content" required rows="6" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                            </div>
                            <div class="flex gap-4 pt-4">
                                <button type="button" onclick="closeModal('modal-add-diary')" class="flex-1 px-4 py-2 bg-gray-100 rounded-lg font-medium">Cancelar</button>
                                <button type="submit" class="flex-1 px-4 py-2 bg-blue-700 text-white rounded-lg font-medium hover:bg-blue-800 transition">Registrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.saveDiary = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Registrando...';

            const formData = new FormData(e.target);
            const data = {
                title: formData.get('title'),
                tag: formData.get('tag') || 'Atendimento',
                content: formData.get('content'),
                authorName: currentUser.displayName,
                authorId: currentUser.uid,
                createdAt: serverTimestamp()
            };
            try {
                await addDoc(collection(db, "diary"), data);
                closeModal('modal-add-diary');
                renderDiario();
            } catch (err) {
                console.error("Erro ao salvar diário:", err);
                alert("Erro ao salvar diário: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Registrar';
            }
        };

        function renderRelatorios() {
            viewContent.innerHTML = `
                <div class="px-8 pt-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Relatórios Pedagógicos</h1>
                    <p class="text-gray-500 mb-8">Geração de documentos em PDF.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div onclick="exportAlunosPDF()" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center cursor-pointer hover:border-blue-300 transition group">
                            <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-100 transition">
                                <i data-lucide="users" class="text-blue-700"></i>
                            </div>
                            <h3 class="font-bold text-gray-900 mb-1">Lista de Alunos</h3>
                            <p class="text-gray-400 text-xs">Exportar estudantes (PDF)</p>
                        </div>
                         <div onclick="exportOcorrenciasPDF()" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center cursor-pointer hover:border-blue-300 transition group">
                            <div class="bg-amber-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-amber-100 transition">
                                <i data-lucide="alert-triangle" class="text-amber-700"></i>
                            </div>
                            <h3 class="font-bold text-gray-900 mb-1">Ocorrências</h3>
                            <p class="text-gray-400 text-xs">Histórico completo (PDF)</p>
                        </div>
                        <div onclick="exportDiarioPDF()" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center cursor-pointer hover:border-blue-300 transition group">
                            <div class="bg-green-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-green-100 transition">
                                <i data-lucide="book-open" class="text-green-700"></i>
                            </div>
                            <h3 class="font-bold text-gray-900 mb-1">Diário de Bordo</h3>
                            <p class="text-gray-400 text-xs">Registros da coordenação (PDF)</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- PDF Export Functions ---
        window.exportAlunosPDF = async () => {
            const { jsPDF } = window.jspdf;
            const docPDF = new jsPDF();
            
            try {
                const q = query(collection(db, "students"), orderBy("name"));
                const snap = await getDocs(q);
                const rows = snap.docs.map(d => {
                    const data = d.data();
                    return [data.name, data.grade, data.responsible || '-', data.phone || '-'];
                });

                docPDF.setFontSize(16);
                docPDF.text("Lista de Alunos - EREF Iva Ferreira", 14, 20);
                docPDF.setFontSize(10);
                docPDF.text(`Gerado em: ${new Date().toLocaleString()}`, 14, 28);

                docPDF.autoTable({
                    startY: 35,
                    head: [['Nome', 'Turma', 'Responsável', 'Telefone']],
                    body: rows,
                    theme: 'striped',
                    headStyles: { fillColor: [29, 78, 216] }
                });

                docPDF.save(`alunos_${new Date().toISOString().split('T')[0]}.pdf`);
            } catch (err) {
                console.error(err);
                alert("Erro ao exportar PDF.");
            }
        };

        window.exportOcorrenciasPDF = async () => {
            const { jsPDF } = window.jspdf;
            const docPDF = new jsPDF();
            
            try {
                const q = query(collection(db, "occurrences"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                const rows = snap.docs.map(d => {
                    const data = d.data();
                    return [data.studentName, data.date, data.severity, data.description];
                });

                docPDF.setFontSize(16);
                docPDF.text("Relatório de Ocorrências - EREF Iva Ferreira", 14, 20);
                docPDF.setFontSize(10);
                docPDF.text(`Gerado em: ${new Date().toLocaleString()}`, 14, 28);

                docPDF.autoTable({
                    startY: 35,
                    head: [['Aluno', 'Data', 'Gravidade', 'Descrição']],
                    body: rows,
                    theme: 'striped',
                    headStyles: { fillColor: [180, 83, 9] }
                });

                docPDF.save(`ocorrencias_${new Date().toISOString().split('T')[0]}.pdf`);
            } catch (err) {
                console.error(err);
                alert("Erro ao exportar PDF.");
            }
        };

        window.exportDiarioPDF = async () => {
            const { jsPDF } = window.jspdf;
            const docPDF = new jsPDF();
            
            try {
                const q = query(collection(db, "diary"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                const rows = snap.docs.map(d => {
                    const data = d.data();
                    const date = data.createdAt?.toDate().toLocaleDateString() || '-';
                    return [date, data.tag, data.title, data.authorName];
                });

                docPDF.setFontSize(16);
                docPDF.text("Diário de Coordenação - EREF Iva Ferreira", 14, 20);
                docPDF.setFontSize(10);
                docPDF.text(`Gerado em: ${new Date().toLocaleString()}`, 14, 28);

                docPDF.autoTable({
                    startY: 35,
                    head: [['Data', 'Categoria', 'Título', 'Autor']],
                    body: rows,
                    theme: 'striped',
                    headStyles: { fillColor: [21, 128, 61] }
                });

                docPDF.save(`diario_${new Date().toISOString().split('T')[0]}.pdf`);
            } catch (err) {
                console.error(err);
                alert("Erro ao exportar PDF.");
            }
        };

    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="antialiased">

    <!-- Loading State -->
    <div id="app-loading" class="fixed inset-0 flex items-center justify-center bg-white z-[100]">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-100 flex flex-col sticky top-0 h-screen shrink-0">
            <div class="p-8 pb-12 flex items-center gap-3">
                <div class="bg-blue-700 w-10 h-10 rounded-xl flex items-center justify-center text-white font-black">I</div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">Iva Ferreira</span>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="navigateTo('dashboard')" data-path="dashboard" class="nav-item flex items-center gap-4 w-full px-4 py-3 text-sm font-semibold rounded-xl text-gray-600 hover:bg-gray-50 transition active:scale-95">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="navigateTo('alunos')" data-path="alunos" class="nav-item flex items-center gap-4 w-full px-4 py-3 text-sm font-semibold rounded-xl text-gray-600 hover:bg-gray-50 transition active:scale-95">
                    <i data-lucide="users" class="w-5 h-5"></i> Alunos
                </button>
                <button onclick="navigateTo('ocorrencias')" data-path="ocorrencias" class="nav-item flex items-center gap-4 w-full px-4 py-3 text-sm font-semibold rounded-xl text-gray-600 hover:bg-gray-50 transition active:scale-95">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i> Ocorrências
                </button>
                <button onclick="navigateTo('diario')" data-path="diario" class="nav-item flex items-center gap-4 w-full px-4 py-3 text-sm font-semibold rounded-xl text-gray-600 hover:bg-gray-50 transition active:scale-95">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Diário da Coordenação
                </button>
                <button onclick="navigateTo('relatorios')" data-path="relatorios" class="nav-item flex items-center gap-4 w-full px-4 py-3 text-sm font-semibold rounded-xl text-gray-600 hover:bg-gray-50 transition active:scale-95">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Relatórios
                </button>
            </nav>
            
            <div class="p-4 border-t border-gray-50">
                <div class="bg-gray-50 p-4 rounded-2xl">
                    <div class="flex items-center gap-3 mb-4">
                        <img id="user-photo" src="" class="w-10 h-10 rounded-full border border-white shadow-sm" />
                        <div class="overflow-hidden">
                            <p id="user-name" class="text-xs font-bold text-gray-900 truncate"></p>
                            <p class="text-[10px] text-gray-400 font-medium tracking-tight uppercase">Coordenador(a)</p>
                        </div>
                    </div>
                    <button onclick="logout()" class="flex items-center justify-center gap-2 w-full py-2 bg-white text-gray-600 text-xs font-bold rounded-lg border border-gray-100 hover:text-red-500 hover:border-red-100 transition active:scale-95">
                        <i data-lucide="log-out" class="w-3 h-3"></i> Sair do Sistema
                    </button>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto">
            <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-50 sticky top-0 z-40 flex items-center justify-end px-8 gap-4">
                <div class="relative max-w-md w-full mr-auto group">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 w-4 h-4 group-focus-within:text-blue-500 transition"></i>
                    <input type="text" placeholder="Buscar aluno ou registro..." class="w-full bg-gray-50 border-none rounded-xl py-2.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-blue-100 outline-none transition" />
                </div>
                <button class="bg-gray-50 w-10 h-10 flex items-center justify-center rounded-xl text-gray-400 hover:text-gray-600 active:scale-95 transition">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                </button>
            </header>
            
            <div id="view-content" class="pb-12">
                <!-- Data renders here -->
            </div>
        </main>
    </div>

</body>
